<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ham1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="url(#ham1)" />
  <!-- Standing hamster silhouette (short round body) -->
  <ellipse cx="50" cy="58" rx="15" ry="18" fill="#FFFFFF" opacity="0.9" />
  <circle cx="50" cy="40" r="8" fill="#FFFFFF" opacity="0.9" />
  <!-- Small ears -->
  <circle cx="44" cy="34" r="3" fill="#FFFFFF" opacity="0.9" />
  <circle cx="56" cy="34" r="3" fill="#FFFFFF" opacity="0.9" />
  <!-- Tiny paws -->
  <ellipse cx="44" cy="52" rx="2" ry="3" fill="#FFFFFF" opacity="0.9" />
  <ellipse cx="56" cy="52" rx="2" ry="3" fill="#FFFFFF" opacity="0.9" />
  <text x="50" y="90" font-family="'Outfit', sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">HAMMY</text>

server.port=8081

# SQL Database Configuration (for Donations, Transactions, Complaints, Supply Orders, Carts)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/maindb;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# MongoDB Database Configuration (for Pets, Applications, Appointments, MedicalRecords, Notifications, CareLogs)
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/pethaven}

# JWT Configuration (for local validation)
jwt.secret=${JWT_SECRET:your_jwt_secret_key_change_in_production_minimum_256_bits_for_security}

# Netty Socket.io Configuration
socketio.host=${SOCKETIO_HOST:0.0.0.0}
socketio.port=${SOCKETIO_PORT:5002}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

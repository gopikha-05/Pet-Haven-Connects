server.port=5001

# Database Configuration (Defaults to H2 with local file persistence, can be overridden by env variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/authdb;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your_jwt_secret_key_change_in_production_minimum_256_bits_for_security}
jwt.expiration=3600000
# 7 days expiration for refresh token
jwt.refreshExpiration=604800000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Spring Mail (SMTP) Configuration configured for AWS SES SMTP
spring.mail.host=${AWS_SES_SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
spring.mail.port=${AWS_SES_SMTP_PORT:587}
spring.mail.username=${AWS_SES_SMTP_USERNAME:AKIAIOSFODNN7EXAMPLE}
spring.mail.password=${AWS_SES_SMTP_PASSWORD:wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
app.mail.from=${AWS_SES_FROM_EMAIL:no-reply@pethaven.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
